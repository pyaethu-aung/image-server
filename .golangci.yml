version: "2"

linters:
  # standard = errcheck, govet, ineffassign, staticcheck, unused
  default: standard
  enable:
    - gosec       # security checks (injection, weak crypto, file perms)
    - misspell
    - unconvert
    - unparam
    - copyloopvar
    - noctx       # HTTP requests without context
    - bodyclose   # unclosed response bodies
  exclusions:
    generated: lax
    rules:
      # gosec's file-permission (G302) and file-inclusion (G304) heuristics
      # target shipped code; test scaffolding legitimately writes temp files
      # and chmods fixture dirs. Keep gosec fully active on production code.
      - linters:
          - gosec
        path: _test\.go
    paths:
      - internal/api/gen
      - internal/db

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - internal/api/gen
      - internal/db
